- defaults:
    link:
      relink: true
      create: true

- clean: ["~"]

- create:
    - ~/docs
    - ~/downloads
    - ~/pictures
    - ~/tmp
    - ~/ws

- link:
    ~/.config/hypr: hypr
    ~/.config/hyprpanel: hyprpanel
    ~/.config/rofi: rofi # https://github.com/adi1090x/rofi
    ~/.config/kitty: kitty
    ~/.config/user-dirs.dirs: home/user-dirs.dirs # custom home folder structure
    ~/.zshrc: home/.zshrc
    ~/.gitconfig: home/.gitconfig
    ~/.local/share/applications/custom: applications

- shell:
    - [chsh -s $(which zsh), Making zsh the default shell]
